name: Tests

on:
  push:
    branches:
      - main
      - "dev/**"
      - "ci/**"
      - "docs/**"
  pull_request:
    branches: [main]

jobs:
  pure-python:
    # Tests for the non-dolfinx modules. dolfinx is expensive to install
    # and we run dolfinx-dependent code only in Colab manually.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Run offline math sanity check
        run: python tests/check_day1_math.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check semi/ tests/

  docker-fem:
    # FEM integration: build the dolfinx dev image, run pytest inside,
    # and execute the benchmark verifiers plus the full V&V suite. The
    # job stays inside a 15-minute budget once the image is cached.
    # This is the only place the dolfinx code paths actually run.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Show runner UID/GID
        # First-run diagnostic. Leave this in until the job proves stable,
        # then it can be removed in a follow-up. The UID/GID determine
        # whether bind-mounted files are writable from inside the container.
        run: id

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USER_UID=1001
            USER_GID=127

      - name: Run pytest inside container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            kronos-semi:ci \
            pytest tests/ -v --tb=short

      - name: Run pytest with coverage gate (>= 95% on semi/)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            kronos-semi:ci \
            pytest tests/ --cov=semi --cov-report=term-missing --cov-report=xml --cov-fail-under=95

      - name: Run pn_1d benchmark
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_benchmark.py pn_1d

      - name: Run pn_1d_bias benchmark
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_benchmark.py pn_1d_bias

      - name: Run pn_1d_bias_reverse benchmark
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_benchmark.py pn_1d_bias_reverse

      - name: Run mos_2d benchmark (2D MOS capacitor C-V)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_benchmark.py mos_2d

      - name: Run V&V suite (MMS Poisson, mesh convergence, conservation, MMS DD)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_verification.py all

      - name: Upload results (benchmarks + V&V artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fem-results
          path: results/
          retention-days: 14
