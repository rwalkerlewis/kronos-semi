name: Tests

on:
  push:
    branches:
      - main
      - "dev/**"
      - "ci/**"
      - "docs/**"
  pull_request:
    branches: [main]

jobs:
  pure-python:
    # Tests for the non-dolfinx modules. dolfinx is expensive to install
    # and we run dolfinx-dependent code only in Colab manually.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Run offline math sanity check
        run: python tests/check_analytical_math.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check semi/ tests/

  docker-fem-build:
    # Build the dolfinx-based dev image once and populate the GHA buildx
    # cache. Downstream jobs (`docker-fem-tests`, `docker-fem-benchmarks`,
    # `docker-fem-vv`) read from this cache via `cache-from: type=gha` and
    # rebuild near-instantly because all heavy layers (dolfinx base, pip
    # dependency layer keyed on pyproject.toml) are cache hits.
    #
    # CI-speedup pass: previously a single 45-minute serial job. Splitting
    # the test, benchmark, and V&V steps lets them run on parallel runners,
    # cutting wall time roughly in half on a typical PR.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image and populate GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USER_UID=1001
            USER_GID=127

  docker-fem-tests:
    # Coverage-gated pytest run inside the dolfinx image. Uses pytest-xdist
    # (`-n auto --dist=loadfile`) to parallelize across runner cores; the
    # `loadfile` distribution keeps each test file on one worker so PETSc/
    # MPI fixtures aren't shared across processes.
    needs: docker-fem-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Load image from GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: true
          cache-from: type=gha
          build-args: |
            USER_UID=1001
            USER_GID=127

      - name: Run pytest with coverage gate (>= 92% on semi/)
        # Coverage gate at 92% — see the comment block in pyproject.toml's
        # [tool.coverage.report] table for the rationale (M13.1 follow-up,
        # SG retained for M13.2). pytest-xdist roughly halves wall time on
        # the 2-core GHA runner; bump to a larger runner for further gains.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            kronos-semi:ci \
            pytest tests/ -n auto --dist=loadfile --tb=short \
              --cov=semi --cov-report=term-missing --cov-report=xml \
              --cov-fail-under=95

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  docker-fem-benchmarks:
    # One matrix entry per benchmark so they run on parallel runners
    # instead of serially inside one 45-minute job. Each matrix job is
    # independent: pulls the image from the GHA buildx cache, runs one
    # benchmark, uploads its own results artifact.
    needs: docker-fem-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pn_1d
            args: pn_1d
          - name: pn_1d_bias
            args: pn_1d_bias
          - name: pn_1d_bias_reverse
            args: pn_1d_bias_reverse
          - name: mos_2d
            args: mos_2d
          # mosfet_2d: Pao-Sah-verifier benchmark added in 01c9dce (M14.3
          # Phase B). The bias_sweep runner stagnates in the V_GS depletion
          # onset (~0.08 V) where the Newton step direction is poor for this
          # 2D MOSFET configuration. continue-on-error: true while a deeper
          # SNES line-search / Gummel-fallback fix is investigated.
          # M16.2 (Lombardi surface mobility): the JSON now ships with
          # model='lombardi' / bulk_model='caughey_thomas' and the verifier
          # window widens to [V_T + 0.4, V_T + 1.0] V at 10 %; the
          # allow-failure flag is intentionally retained because retiring
          # it depends on an independent SNES line-search audit. If the
          # Lombardi run happens to clear the SNES stagnation it is a
          # happy side effect; a separate follow-up PR retires this flag.
          - name: mosfet_2d
            args: mosfet_2d
            allow-failure: "true"
          - name: pn_1d_turnon
            args: pn_1d_turnon
          # M16.7 demonstrator: 1D pn diode switching transient via the
          # voltage_t.step variant (anode bias steps from 0.0 V to
          # 0.6 V at t = 5 ns). Lightweight verifier (finiteness,
          # qualitative turn-on); the V&V gate for voltage_t lives in
          # audit case 06.
          - name: pn_1d_pulse
            args: pn_1d_pulse
          # M16.7 demonstrator: 1D pn diode under sinusoidal large-
          # signal forward-bias drive via the voltage_t.table variant
          # (V_DC = 0.4 V, dV = 50 mV, F = 1 MHz, 4 cycles, 200
          # samples per cycle). Lightweight verifier (FFT peak at the
          # fundamental, second-harmonic ratio); the small-signal
          # AC-vs-FFT V&V gate lives in audit case 06.
          - name: diode_sine_1d
            args: diode_sine_1d
          - name: rc_ac_sweep
            args: rc_ac_sweep
          # M16.1 Acceptance test 2: Caughey-Thomas vs constant-mobility
          # divergence/convergence verifier on a 1D pn diode forward
          # sweep. Internally also runs a constant-mu companion sweep,
          # so this step is roughly 2x the runtime of pn_1d_bias.
          - name: diode_velsat_1d
            args: diode_velsat_1d
          # M16.3 Acceptance test 2: SRH-only vs SRH+Auger divergence
          # and analytical-match verifier on a 1D pn diode forward
          # sweep. Internally also runs an SRH-only companion sweep,
          # so this step is roughly 2x the runtime of pn_1d_bias.
          - name: diode_auger_1d
            args: diode_auger_1d
          # M16.4 Acceptance test 2: Boltzmann-vs-Fermi-Dirac
          # equilibrium V_bi divergence at N_D = 1e20 cm^-3 plus
          # FEM-vs-Blakemore-analytical V_bi consistency. Internally
          # runs a Boltzmann companion equilibrium solve so the step
          # is roughly 2x the runtime of an equilibrium-only run.
          - name: diode_fermi_dirac_1d
            args: diode_fermi_dirac_1d
          # M16.5 Acceptance test 1: Pt-on-n-Si Schottky diode
          # forward I-V matches the closed-form thermionic-emission
          # analytical reference within 10 % from V_F = 0.1 V to
          # 0.5 V. No companion run; the verifier compares the FEM
          # I-V directly to the closed form via thermionic_iv.
          - name: schottky_1d
            args: schottky_1d
          # M16.6 Acceptance test 1: heavily-doped Si abrupt junction
          # reverse-bias I-V matches the closed-form Kane band-to-band
          # breakdown reference within 20 % from V_R = -8 V to -4 V.
          # The verifier reads the bbt-on benchmark output and
          # compares to kane_breakdown_iv.
          - name: zener_1d
            args: zener_1d
          - name: resistor_3d_builtin
            args: resistor_3d --input benchmarks/resistor_3d/resistor.json
          - name: resistor_3d_gmsh
            args: resistor_3d --input benchmarks/resistor_3d/resistor_gmsh.json
          # examples catalogue (v0.23.x): practical-device starting
          # points exercising the M16 physics catalogue. Smoke gates
          # (run completion, finite I-V, qualitative ordering); the
          # V&V layer is benchmarks/. Examples must NOT carry
          # allow-failure: "true" by default; if a run fails the
          # example is broken and the PR should not merge.
          #
          # nmos_idvgs is the remaining allow-failure carve-out:
          # exercises a V_GS bias sweep across the MOSFET inversion
          # onset under FD statistics, where the current SNES
          # configuration in bias_sweep stagnates without a line-
          # search-strategy upgrade. This is bias_sweep work, not
          # transient work; M18 (adaptive dt for the transient
          # runner) does not address it. Tagged allow-failure: "true"
          # so the catalogue matrix is still exercised end-to-end
          # while the bias_sweep stabilization follow-up lands.
          - name: nmos_idvgs
            args: nmos_idvgs
            allow-failure: "true"
          - name: schottky_iv_temperature
            args: schottky_iv_temperature
          - name: power_diode_reverse_recovery
            args: power_diode_reverse_recovery
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Load image from GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: true
          cache-from: type=gha
          build-args: |
            USER_UID=1001
            USER_GID=127

      - name: Run benchmark ${{ matrix.name }}
        continue-on-error: ${{ matrix.allow-failure == 'true' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_benchmark.py ${{ matrix.args }}

      - name: Upload results for ${{ matrix.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fem-results-${{ matrix.name }}
          path: results/
          retention-days: 14

  docker-fem-vv:
    # V&V suite (MMS Poisson, mesh convergence, conservation, MMS DD).
    # Has a registered verifier with strict thresholds; runs in its own
    # job so a benchmark-matrix flake doesn't block the V&V signal.
    needs: docker-fem-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Load image from GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: true
          cache-from: type=gha
          build-args: |
            USER_UID=1001
            USER_GID=127

      - name: Run V&V suite (MMS Poisson, mesh convergence, conservation, MMS DD)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            -e MPLBACKEND=Agg \
            kronos-semi:ci \
            python scripts/run_verification.py all

      - name: Upload V&V results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fem-results-vv
          path: results/
          retention-days: 14

  docker-fem-audit:
    # Physics validation audit suite (Phase 1: cross-runner consistency
    # cases). The suite is deselected from the default test run via
    # pyproject.toml's `-m 'not audit'`; this job opts back in with
    # `-m audit -s` and writes per-case CSVs to /tmp/audit/. The conftest
    # session-finish hook regenerates `docs/PHYSICS_AUDIT.md` from the
    # markdown fragments; the second step verifies the committed file
    # matches the freshly generated one so stale audit docs cannot land
    # again (PR #60 regression guard).
    needs: docker-fem-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Load image from GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: kronos-semi:ci
          load: true
          cache-from: type=gha
          build-args: |
            USER_UID=1001
            USER_GID=127

      - name: Run physics validation audit
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspaces/kronos-semi" \
            -w /workspaces/kronos-semi \
            kronos-semi:ci \
            pytest tests/audit/ -v -m audit -s

      - name: Verify PHYSICS_AUDIT.md is in sync with audit run
        run: |
          git diff --exit-code docs/PHYSICS_AUDIT.md || (
            echo "::error::docs/PHYSICS_AUDIT.md is stale. Run 'pytest tests/audit/ -m audit' locally and commit the regenerated file."
            exit 1
          )
