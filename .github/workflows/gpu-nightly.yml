name: gpu-nightly

# Nightly acceptance run for the M15 GPU linear-solver path.
# Gated on the GPU_RUNNER_AVAILABLE repository variable so this file
# can ship before any self-hosted GPU runner is wired in: if the var
# is absent or 'false', every job below short-circuits to a no-op.

on:
  schedule:
    - cron: "17 6 * * *"  # 06:17 UTC daily
  workflow_dispatch:

jobs:
  gpu-acceptance:
    if: ${{ vars.GPU_RUNNER_AVAILABLE == 'true' }}
    runs-on: [self-hosted, gpu]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Show GPU and PETSc backend info
        run: |
          nvidia-smi || rocm-smi || true
          python -c "from semi import compute; print(compute.device_info())"

      - name: Run M15 acceptance tests (A1 correctness)
        run: |
          pytest tests/fem/test_gpu_backend.py -v --tb=short

      - name: Run A2 speedup benchmark (3D Poisson, ~500k DOFs)
        run: |
          python scripts/run_benchmark.py benchmarks/poisson_3d_gpu/input.json \
            --override solver.backend=cpu-mumps \
            --output runs/gpu-nightly-cpu
          python scripts/run_benchmark.py benchmarks/poisson_3d_gpu/input.json \
            --output runs/gpu-nightly-gpu
          python - <<'PY'
          import json, sys, pathlib
          cpu = json.loads(pathlib.Path("runs/gpu-nightly-cpu/manifest.json").read_text())
          gpu = json.loads(pathlib.Path("runs/gpu-nightly-gpu/manifest.json").read_text())
          t_cpu = cpu["solver"]["linear_solve_wall_s"]
          t_gpu = gpu["solver"]["linear_solve_wall_s"]
          ratio = t_cpu / max(t_gpu, 1e-12)
          print(f"CPU wall: {t_cpu:.3f} s  GPU wall: {t_gpu:.3f} s  speedup: {ratio:.2f}x")
          if ratio < 5.0:
              sys.exit(f"A2 acceptance failed: speedup {ratio:.2f}x < 5x")
          PY
